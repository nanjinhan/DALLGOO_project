# 프로젝트 폴더명이 비ASCII(한글)라 자동 프로젝트명이 비어버리는 문제 방지용 고정 이름
name: dallgoo-board

services:
  db:
    image: mysql:8.0
    container_name: dallgoo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dallgoo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dallgoo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-dallgoo}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-dallgoo_mq_pw}
    ports:
      - "5672:5672"     # AMQP (백엔드/워커가 여기로 연결)
      - "15672:15672"   # 관리자 웹 UI (http://서버:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: dallgoo-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Windows 바인드 마운트에서 네이티브 파일감시가 죽는 문제 방지(폴링 사용)
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  worker:
    build: ./backend
    container_name: dallgoo-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: python -m app.worker

  frontend:
    build: ./frontend
    container_name: dallgoo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
  uploads:
