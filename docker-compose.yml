# 프로젝트 폴더명이 비ASCII(한글)라 자동 프로젝트명이 비어버리는 문제 방지용 고정 이름
name: dallgoo-board

services:
  db:
    image: mysql:8.0
    container_name: dallgoo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      # 호스트 포트만 .env로 조정 가능(기본 3306). 컨테이너 내부는 항상 3306이고
      # 백엔드는 도커 네트워크에서 db:3306으로 붙으므로 앱 동작과 무관하다.
      # 로컬에서 다른 프로젝트와 포트가 겹칠 때만 .env에 DB_PORT를 지정한다.
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dallgoo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dallgoo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-dallgoo}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-dallgoo_mq_pw}
    ports:
      - "5672:5672"     # AMQP (백엔드/워커가 여기로 연결)
      - "15672:15672"   # 관리자 웹 UI (http://서버:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.1
    container_name: dallgoo-kafka
    restart: unless-stopped
    # 단일 노드 KRaft 모드(Zookeeper 불필요). 브로커+컨트롤러 겸용.
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build: ./backend
    container_name: dallgoo-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Windows 바인드 마운트에서 네이티브 파일감시가 죽는 문제 방지(폴링 사용)
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      # 호스트 포트만 .env로 조정 가능(기본 8000 — 운영 nginx가 바라보는 포트).
      # 로컬에서 포트가 겹칠 때만 .env에 BACKEND_PORT를 지정한다.
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  worker:
    build: ./backend
    container_name: dallgoo-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: python -m app.worker

  activity-consumer:
    build: ./backend
    container_name: dallgoo-activity-consumer
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    command: python -m app.activity_consumer

  frontend:
    build: ./frontend
    container_name: dallgoo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
  uploads:
